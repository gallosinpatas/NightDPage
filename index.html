<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Dragons - Invitación Among Us</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            min-height: 100vh;
            background-color: #0f1015;
            color: #ffffff;
            margin: 0;
            box-sizing: border-box;
            align-items: center;
            justify-content: center;
        }

        .container {
            background-color: #1a1b26;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #2d2f40;
            box-sizing: border-box;
        }

        h1 {
            color: #ff4747;
            margin-top: 0;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            color: #a9b1d6;
            line-height: 1.5;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .btn.primary {
            background-color: #ff4747;
            box-shadow: 0 4px 15px rgba(255, 71, 71, 0.3);
        }

        .btn.primary:hover {
            background-color: #d63c3c;
            transform: translateY(-2px);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .code-display {
            background-color: #0f1015;
            padding: 1.2rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 2.5rem;
            letter-spacing: 5px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 1rem;
            border: 2px dashed #414868;
        }

        #copy-status {
            color: #73daca;
            font-size: 0.95rem;
            margin-top: -5px;
            margin-bottom: 20px;
            height: 20px;
            font-weight: bold;
        }

        .promo {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px dashed #414868;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 Unirse a la Partida</h1>
        <p>Estás a punto de unirte a una partida privada de Among Us.</p>

        <div class="code-display" id="display-code">------</div>
        <div id="copy-status"></div>

        <button id="copy-btn" class="btn" style="background-color: #3b4252; color: #d8dee9; border: 1px solid #4c566a;">
            📋 Copiar Código
        </button>

        <a href="#" id="play-btn" class="btn primary">
            🎮 Abrir Among Us Ahora
        </a>

        <a href="https://play.google.com/store/apps/details?id=com.innersloth.spacemafia"
            style="color: #a9b1d6; font-size: 0.9rem; text-decoration: none; display: inline-block; margin-top: 15px;">
            ¿No tienes el juego? Descárgalo aquí
        </a>

        <div class="promo">
            <h3 style="margin: 0 0 10px 0; font-size: 1.1rem;">🔥 App de Night Dragons</h3>
            <p style="font-size: 0.85rem; margin-bottom: 15px; color: #a9b1d6;">Descarga la App de Escritorio oficial
                para el clan.</p>
            <a href="https://github.com/GallosInPatas/NightDPage" target="_blank" class="btn"
                style="background-color: #7aa2f7; margin-bottom: 0px; max-width: 200px; margin-left: auto; margin-right: auto; padding: 10px; font-size: 0.95rem;">Obtener
                App</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let roomCode = urlParams.get('code') || urlParams.get('codigo');

        const displayCodeEl = document.getElementById('display-code');
        const playBtn = document.getElementById('play-btn');
        const copyBtn = document.getElementById('copy-btn');
        const copyStatusEl = document.getElementById('copy-status');

        if (roomCode) {
            roomCode = roomCode.toUpperCase();
            displayCodeEl.textContent = roomCode;

            const queryString = window.location.search;
            const hashString = window.location.hash;
            playBtn.href = "amongus://" + queryString + hashString;

            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(roomCode).then(() => {
                    copyStatusEl.textContent = "¡Código copiado! Abriendo Among Us...";
                    copyBtn.innerHTML = "✅ Abriendo Juego...";
                    copyBtn.style.backgroundColor = "#4CAF50";
                    copyBtn.style.color = "white";
                    copyBtn.style.borderColor = "#4CAF50";

                    // Automatically trigger the play button logic to open the game
                    setTimeout(() => {
                        window.location.href = playBtn.href;
                    }, 500);

                    setTimeout(() => {
                        copyStatusEl.textContent = "";
                        copyBtn.innerHTML = "📋 Copiar Código y Jugar";
                        copyBtn.style.backgroundColor = "#3b4252";
                        copyBtn.style.color = "#d8dee9";
                        copyBtn.style.borderColor = "#4c566a";
                    }, 3500);
                }).catch(err => {
                    copyStatusEl.textContent = "Error al copiar. Selecciona el texto manualmente.";
                    copyStatusEl.style.color = "#ff4747";
                });
            });
        } else {
            displayCodeEl.textContent = "SIN CÓDIGO";
            displayCodeEl.style.color = "#ff4747";
            playBtn.href = "amongus://";
            copyBtn.style.opacity = "0.5";
            copyBtn.disabled = true;
        }
    </script>
</body>

</html>
