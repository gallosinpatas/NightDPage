<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abriendo Among Us...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            text-align: center;
        }

        .container {
            background-color: #1e1e1e;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #ff4747;
            /* Typical among us red accent */
            margin-top: 0;
        }

        p {
            color: #b3b3b3;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #ff4747;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.3s, transform 0.1s;
        }

        .btn:hover {
            background-color: #d63c3c;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff4747;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="loader"></div>
        <h1>Redirigiendo...</h1>
        <p>Intentando abrir Among Us. Si no se abre automáticamente en unos segundos o si el navegador te pregunta,
            asegúrate de permitir abrir enlaces en la aplicación externa.</p>

        <p id="copy-status" style="color: #4CAF50; font-weight: bold; display: none;"></p>
        <a href="amongus://" id="deep-link-btn" class="btn">Abrir Juego Manualmente</a>
        <br><br>
        <a href="https://play.google.com/store/apps/details?id=com.innersloth.spacemafia" class="btn"
            style="background-color: #4CAF50; margin-top: 10px;">Descargar en Play Store</a>
    </div>

    <script>
        function copyCodeToClipboard(code) {
            if (!code) return;
            // La API de portapapeles requiere contexto seguro (HTTPS)
            navigator.clipboard.writeText(code).then(() => {
                const statusEl = document.getElementById("copy-status");
                statusEl.textContent = "¡Código de sala (" + code + ") copiado al portapapeles!";
                statusEl.style.display = "block";
            }).catch(err => {
                console.error("No se pudo copiar el código automáticamente:", err);
            });
        }

        function openAmongUs() {
            // Extraer el código de sala de la URL (ej: ?code=ABCDEF o ?codigo=ABCDEF)
            const urlParams = new URLSearchParams(window.location.search);
            const roomCode = urlParams.get('code') || urlParams.get('codigo');

            const queryString = window.location.search;
            const hashString = window.location.hash;

            // Construir el enlace profundo preservando todo
            const amongUsBase = "amongus://";
            const fullDeepLink = amongUsBase + queryString + hashString;

            // Actualizar el botón manual
            const btn = document.getElementById("deep-link-btn");
            btn.href = fullDeepLink;

            // Si hay un código, intentar copiarlo al portapapeles
            if (roomCode) {
                // Al hacer clic en el botón manual, garantizar que se copie
                btn.addEventListener('click', () => {
                    copyCodeToClipboard(roomCode);
                });

                // Intentar copiar automáticamente al cargar
                copyCodeToClipboard(roomCode);
            }

            // Intentar redirigir automáticamente al juego
            window.location.replace(fullDeepLink);
        }

        // Ejecutar después de un breve retraso para que la interfaz cargue
        window.onload = function () {
            setTimeout(openAmongUs, 300);
        };
    </script>
</body>

</html>
